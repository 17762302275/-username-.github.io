<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片上传+预览</title>
  <!-- 企业微信JS SDK -->
  <script src="https://res.wx.qq.com/open/js/jweixin-1.2.0.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      padding: 20px;
      font-size: 16px;
      max-width: 400px;
      margin: 0 auto;
    }

    #fileInput {
      display: none;
    }

    .upload-btn {
      display: block;
      width: 100%;
      padding: 18px;
      background: #4285F4;
      color: white;
      font-size: 17px;
      text-align: center;
      border-radius: 12px;
      cursor: pointer;
    }

    #preview {
      width: 100%;
      min-height: 120px;
      margin: 25px 0;
      border: 2px dashed #ccc;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #preview img {
      width: 100%;
      height: auto;
      display: none;
      border-radius: 8px;
    }

    #closeBtn {
      display: block;
      width: 100%;
      padding: 18px;
      background: #28a745;
      color: white;
      font-size: 17px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h3>选择图片 → 预览 → 返回企业微信</h3>

  <label for="fileInput" class="upload-btn">📷 点击选择图片</label>
  <input type="file" id="fileInput" accept="image/*">

  <div id="preview">
    <img id="imgPreview">
  </div>

  <button id="closeBtn">✅ 完成并返回</button>

  <script>
    const fileInput = document.getElementById('fileInput');
    const imgPreview = document.getElementById('imgPreview');
    const closeBtn = document.getElementById('closeBtn');
    let selectedFile = null;

    // 图片预览
    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      selectedFile = file;
      imgPreview.src = URL.createObjectURL(file);
      imgPreview.style.display = 'block';
    });

    // ==============================================
    // 🔥 修复 BUG：点一下就关闭企业微信网页
    // ==============================================
    closeBtn.addEventListener('click', function() {
      try {
        if (window.wx && wx.closeWindow) {
          wx.closeWindow();
        } else {
          window.history.back();
          window.close();
        }
      } catch (e) {
        window.close();
      }
    });
  </script>
</body>
</html>
