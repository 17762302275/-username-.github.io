<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片上传+预览</title>
  <!-- 必须引入企业微信JS SDK -->
  <script src="https://res.wx.qq.com/open/js/jweixin-1.2.0.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      padding: 20px;
      font-size: 16px;
      max-width: 400px;
      margin: 0 auto;
    }

    /* 隐藏原生文件按钮 */
    #fileInput {
      display: none;
    }

    /* 选择图片按钮 */
    .upload-btn {
      display: block;
      width: 100%;
      padding: 18px;
      background: #4285F4;
      color: white;
      font-size: 17px;
      text-align: center;
      border-radius: 12px;
      cursor: pointer;
    }

    /* 预览框 */
    #preview {
      width: 100%;
      min-height: 120px;
      margin: 25px 0;
      border: 2px dashed #ccc;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #preview img {
      width: 100%;
      height: auto;
      display: none;
      border-radius: 8px;
    }

    /* 关闭按钮（原上传按钮） */
    #closeBtn {
      display: block;
      width: 100%;
      padding: 18px;
      background: #28a745;
      color: white;
      font-size: 17px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h3>选择图片 → 预览 → 返回企业微信</h3>

  <!-- 选择图片按钮 -->
  <label for="fileInput" class="upload-btn">📷 点击选择图片</label>
  <input type="file" id="fileInput" accept="image/*">

  <!-- 中间预览框 -->
  <div id="preview">
    <img id="imgPreview">
  </div>

  <!-- 关闭并返回企业微信按钮 -->
  <button id="closeBtn">✅ 完成并返回</button>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const imgPreview = document.getElementById('imgPreview');
    const closeBtn = document.getElementById('closeBtn');
    let selectedFile = null;

    // 选择图片预览逻辑
    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      selectedFile = file;
      const url = URL.createObjectURL(file);

      imgPreview.src = url;
      imgPreview.style.display = 'block';
    });

    // 核心：点击按钮关闭页面，返回企业微信
    closeBtn.addEventListener('click', function() {
      // 企业微信关闭当前窗口的接口
      if (typeof wx !== 'undefined' && wx.closeWindow) {
        wx.closeWindow();
      } else {
        // 非企业微信环境的兼容提示
        alert('当前不在企业微信环境，无法直接关闭页面');
        // 备用方案：尝试关闭浏览器窗口（仅部分浏览器支持）
        window.close();
      }
    });
  </script>
</body>
</html>
