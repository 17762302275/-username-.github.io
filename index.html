<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片上传+预览</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      padding: 20px;
      font-size: 16px;
    }

    /* 隐藏原生小按钮 */
    #fileInput {
      display: none;
    }

    /* 自定义超大按钮 */
    .upload-btn {
      display: block;
      width: 100%;
      padding: 20px;
      background: #4285F4;
      color: white;
      font-size: 18px;
      text-align: center;
      border-radius: 12px;
      cursor: pointer;
    }

    /* 预览图区域（自动占位，不会挤按钮） */
    #preview {
      width: 100%;
      max-width: 400px;
      margin: 30px 0; /* 上下留空！关键 */
      display: none;
    }
    #preview img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    /* 上传按钮 */
    #uploadBtn {
      display: block;
      width: 100%;
      padding: 20px;
      background: #28a745;
      color: white;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h3>选择图片 → 预览 → 上传</h3>

  <!-- 1. 选择图片按钮 -->
  <label for="fileInput" class="upload-btn">📷 点击选择图片</label>
  <input type="file" id="fileInput" accept="image/*">

  <!-- 2. 预览区域（在两个按钮中间！） -->
  <div id="preview">
    <img id="imgPreview">
  </div>

  <!-- 3. 上传按钮 -->
  <button id="uploadBtn">✅ 确认上传</button>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const imgPreview = document.getElementById('imgPreview');
    const uploadBtn = document.getElementById('uploadBtn');
    let selectedFile = null;

    // 选择文件 → 预览
    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      selectedFile = file;
      const url = URL.createObjectURL(file);

      imgPreview.src = url;
      preview.style.display = 'block';
    });

    // 上传
    uploadBtn.addEventListener('click', function() {
      if (!selectedFile) {
        alert('请先选择图片！');
        return;
      }
      alert('上传成功！文件名：' + selectedFile.name);
    });
  </script>
</body>
</html>
