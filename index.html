<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片上传+预览</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      padding: 20px;
      font-size: 16px;
      max-width: 400px; /* 限制整体宽度 */
      margin: 0 auto;   /* 页面居中 */
    }

    /* 隐藏原生文件按钮 */
    #fileInput {
      display: none;
    }

    /* 选择图片按钮（电脑不大，手机全屏） */
    .upload-btn {
      display: block;
      width: 100%;
      padding: 18px;
      background: #4285F4;
      color: white;
      font-size: 17px;
      text-align: center;
      border-radius: 12px;
      cursor: pointer;
    }

    /* 预览框：固定在两个按钮中间，自动适应图片 */
    #preview {
      width: 100%;
      min-height: 120px;
      margin: 25px 0;
      border: 2px dashed #ccc;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 图片自适应 */
    #preview img {
      width: 100%;
      height: auto;
      display: none;
      border-radius: 8px;
    }

    /* 上传按钮 */
    #uploadBtn {
      display: block;
      width: 100%;
      padding: 18px;
      background: #28a745;
      color: white;
      font-size: 17px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h3>选择图片 → 预览 → 上传</h3>

  <!-- 选择图片按钮 -->
  <label for="fileInput" class="upload-btn">📷 点击选择图片</label>
  <input type="file" id="fileInput" accept="image/*">

  <!-- 中间预览框（永久占位） -->
  <div id="preview">
    <img id="imgPreview">
  </div>

  <!-- 上传按钮 -->
  <button id="uploadBtn">✅ 确认上传</button>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const imgPreview = document.getElementById('imgPreview');
    const uploadBtn = document.getElementById('uploadBtn');
    let selectedFile = null;

    // 选择图片 → 预览
    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      selectedFile = file;
      const url = URL.createObjectURL(file);

      imgPreview.src = url;
      imgPreview.style.display = 'block';
    });

    // 上传
    uploadBtn.addEventListener('click', function() {
      if (!selectedFile) {
        alert('请先选择图片！');
        return;
      }
      alert('上传成功！文件名：' + selectedFile.name);
    });
  </script>
</body>
</html>
