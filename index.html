<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：必须加这个，手机端才会按你的CSS适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件选择优化示例</title>
    <style>
        /* 隐藏原生文件控件 */
        .file-input {
            display: none;
        }

        /* 自定义按钮样式，手机端也很大很好点 */
        .custom-file-btn {
            display: inline-block;
            padding: 16px 32px;
            background-color: #2ea44f;
            color: white;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            /* 手机端全屏宽度 */
            width: 100%;
            box-sizing: border-box;
        }

        .custom-file-btn:hover {
            background-color: #2c974b;
        }
    </style>
</head>
<body>
    <!-- 隐藏原生文件控件 -->
    <input type="file" id="fileInput" class="file-input">
    <!-- 自定义大按钮 -->
    <label for="fileInput" class="custom-file-btn">
        点击选择文件
    </label>

    <script>
        // 可选：文件选择后的回调逻辑
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                alert('你选择了文件：' + file.name);
                // 这里写你原本要处理文件的代码
            }
        });
    </script>
</body>
</html>
